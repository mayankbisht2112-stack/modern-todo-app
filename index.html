<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayank's To-do List</title>
</head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<body>
    <div class="container">
        <div class="todo-App">
            <h1>TO-DO APP</h1>
            <div class="stat-container">
                <div class="details">
                    <h3>Keep it up</h3>
                    <div id="progressbar">
                        <div id="progress"></div>
                    </div>
                </div>
                <div class="stats-number">
                    <p id="numbers">0 / 0</p>
                </div>
            </div>
            
            <form class="input-area">
                <input type="text" id="task-input" placeholder="Add a new task...">
                <button type="submit" id="addtask-btn"><i class="fa-solid fa-plus"></i></button>
            </form>
            <!-- //this wil hold the task list and show an image if it is empty -->
             <div class="todos-container">
                <!-- inside this div we have our unorder list in which each task will be added -->
                 <div id="ul-task-list">
                    <img class="empty-image" src="task-management-illustration-svg-download-png-6369686.webp" alt="empty">
                 </div>
             </div>
        </div>
    </div>


</body>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.9.1/tsparticles.confetti.bundle.min.js"></script>
</html>
